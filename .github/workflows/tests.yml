name: Tests

on:
  push:
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fast test suite
        run: pytest -q -m "not verification"

  verification-tests:
    runs-on: ubuntu-latest
    needs: fast-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run multi-species equilibrium verification
        run: pytest -q tests/test_multispecies_equilibrium.py
      - name: Run particle-weight verification
        run: pytest -q tests/test_particle_weight_verification.py
      - name: Run relaxation figure verification (stable hosted-runner cases)
        run: pytest -q tests/test_relaxation_figures_verification.py -k "not fig6_equal"
